[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    unit: pure-Python tests that don't touch ffmpeg or PyTorch
    integration: tests that exercise the CLI or call ffmpeg
    regression: tests that pin known-good selections on real songs
    e2e: end-to-end tests that produce a real ringtone file
    requires_torch: needs the [deep] extras (PyTorch + demucs)
    requires_mps: needs Apple Silicon Metal GPU
    requires_cuda: needs an NVIDIA GPU + CUDA
    requires_ffmpeg: needs ffmpeg in PATH
    requires_real_audio: needs the 5 test songs in samples/source/
    slow: takes >5 seconds (includes deep model inference)
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
