  <text x="126" y="532" font-size="12" font-weight="700" fill="#0f172a">Formula  v(t) =</text>
  <text x="126" y="552" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1d4ed8">    0.2 · 5^(t/20)            for t ∈ [0, 20)     ← exponential rise</text>
