<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640.0" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Intelligent Audio Analysis</text>
  <text x="640.0" y="68" text-anchor="middle" font-size="14" fill="#64748b">From any audio source to the right envelope — in four steps.</text>
  <rect x="60" y="110" width="200" height="90" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="160.0" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">📁 Source Audio</text>
  <text x="160.0" y="160" text-anchor="middle" font-size="11" fill="#64748b">mp3 / m4a / wav / flac</text>
  <text x="160.0" y="178" text-anchor="middle" font-size="11" fill="#64748b">any duration ≥ 30s</text>
  <rect x="320" y="110" width="220" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="320" y="110" width="6" height="70" rx="3" fill="#7c3aed"/>
  <text x="338" y="138" font-size="13" font-weight="700" fill="#0f172a">MFCC variance</text>
  <text x="338" y="160" font-size="11" fill="#64748b" font-style="italic">timbre changes</text>
  <rect x="320" y="192" width="220" height="70" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="320" y="192" width="6" height="70" rx="3" fill="#0ea5e9"/>
  <text x="338" y="220" font-size="13" font-weight="700" fill="#0f172a">Chroma std-dev</text>
  <text x="338" y="242" font-size="11" fill="#64748b" font-style="italic">harmonic motion</text>
  <rect x="320" y="274" width="220" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="320" y="274" width="6" height="70" rx="3" fill="#059669"/>
  <text x="338" y="302" font-size="13" font-weight="700" fill="#0f172a">Onset rate</text>
  <text x="338" y="324" font-size="11" fill="#64748b" font-style="italic">events per second</text>
  <rect x="320" y="356" width="220" height="70" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="320" y="356" width="6" height="70" rx="3" fill="#ea580c"/>
  <text x="338" y="384" font-size="13" font-weight="700" fill="#0f172a">Zero-crossing rate</text>
  <text x="338" y="406" font-size="11" fill="#64748b" font-style="italic">consonants / sibilance</text>
  <text x="430.0" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">librosa features</text>
  <line x1="260" y1="155.0" x2="312" y2="274" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="600" y="130" width="280" height="360" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="6,3" filter="url(#card-shadow)"/>
  <text x="740.0" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">Decision Tree</text>
  <rect x="614" y="180" width="252" height="48" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="624" y="196" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0f172a" font-weight="600">if MFCC &lt; 12</text>
  <text x="624" y="210" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#64748b">AND chroma_std &lt; 0.26</text>
  <text x="856" y="210" text-anchor="end" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#ea580c" font-weight="700">→ percussive</text>
  <rect x="614" y="236" width="252" height="48" rx="6" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="624" y="252" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0f172a" font-weight="600">elif onset ≥ 4.5</text>
  <text x="624" y="266" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#64748b">AND zcr &lt; 0.10</text>
  <text x="856" y="266" text-anchor="end" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0ea5e9" font-weight="700">→ melodic</text>
  <rect x="614" y="292" width="252" height="48" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="624" y="308" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0f172a" font-weight="600">elif zcr ≥ 0.06</text>
  <text x="624" y="322" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#64748b">AND MFCC ≥ 14 AND chroma ≥ 0.26</text>
  <text x="856" y="322" text-anchor="end" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#7c3aed" font-weight="700">→ vocal</text>
  <rect x="614" y="348" width="252" height="48" rx="6" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="624" y="364" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0f172a" font-weight="600">else</text>
  <text x="624" y="378" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#64748b">(safe fallback)</text>
  <text x="856" y="378" text-anchor="end" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#0ea5e9" font-weight="700">→ melodic</text>
  <line x1="540" y1="145.0" x2="592" y2="310.0" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="540" y1="227.0" x2="592" y2="310.0" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="540" y1="309.0" x2="592" y2="310.0" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="540" y1="391.0" x2="592" y2="310.0" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)" opacity="0.7"/>
  <rect x="950" y="110" width="270" height="170" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="950" y="110" width="270" height="6" rx="12" fill="#7c3aed"/>
  <text x="966" y="146" font-size="18" font-weight="800" fill="#7c3aed">vocal</text>
  <text x="966" y="170" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.5">ENVELOPE PRESET</text>
  <text x="966" y="190" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#0f172a">rise 5s · sustain 22s · drop 3s</text>
  <text x="966" y="215" font-size="11" fill="#64748b" font-style="italic">chorus is dense — get there fast</text>
  <path d="M 966 266 Q 979.0 262.1 987.6666666666666 240 L 1083.0 240 L 1096 266" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <line x1="966" y1="267" x2="1096" y2="267" stroke="#94a3b8" stroke-width="1"/>
  <text x="1106" y="248" font-size="10" fill="#64748b">借月, 离开我的依赖, 跳楼机</text>
  <text x="1106" y="262" font-size="10" fill="#94a3b8">test samples</text>
  <rect x="950" y="298" width="270" height="170" rx="12" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="950" y="298" width="270" height="6" rx="12" fill="#0ea5e9"/>
  <text x="966" y="334" font-size="18" font-weight="800" fill="#0ea5e9">melodic</text>
  <text x="966" y="358" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.5">ENVELOPE PRESET</text>
  <text x="966" y="378" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#0f172a">rise 12s · sustain 15s · drop 3s</text>
  <text x="966" y="403" font-size="11" fill="#64748b" font-style="italic">balanced build, atmosphere room</text>
  <path d="M 966 454 Q 997.2 450.1 1018.0 428 L 1083.0 428 L 1096 454" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <line x1="966" y1="455" x2="1096" y2="455" stroke="#94a3b8" stroke-width="1"/>
  <text x="1106" y="436" font-size="10" fill="#64748b">Brainiac_Maniac</text>
  <text x="1106" y="450" font-size="10" fill="#94a3b8">test sample</text>
  <rect x="950" y="486" width="270" height="170" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="950" y="486" width="270" height="6" rx="12" fill="#ea580c"/>
  <text x="966" y="522" font-size="18" font-weight="800" fill="#ea580c">percussive</text>
  <text x="966" y="546" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.5">ENVELOPE PRESET</text>
  <text x="966" y="566" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#0f172a">rise 20s · sustain 7s · drop 3s</text>
  <text x="966" y="591" font-size="11" fill="#64748b" font-style="italic">approaching from afar (v1 recipe)</text>
  <path d="M 966 642 Q 1018.0 638.1 1052.6666666666667 616 L 1083.0 616 L 1096 642" stroke="#ea580c" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <line x1="966" y1="643" x2="1096" y2="643" stroke="#94a3b8" stroke-width="1"/>
  <text x="1106" y="624" font-size="10" fill="#64748b">war_drums</text>
  <text x="1106" y="638" font-size="10" fill="#94a3b8">test sample</text>
  <path d="M 880 310.0 C 915.0 310.0, 915.0 195.0, 944 195.0" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 880 310.0 C 915.0 310.0, 915.0 383.0, 944 383.0" fill="none" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 880 310.0 C 915.0 310.0, 915.0 571.0, 944 571.0" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="640.0" y="690" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">5/5 accuracy on the test set · &lt;2 seconds per song</text>
</svg>