  <line x1="982.6666666666666" y1="225.0" x2="992.3333333333333" y2="225.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1174.3333333333333" y1="225.0" x2="1184.0" y2="225.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="410" width="1280" height="170" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <g><circle cx="570.0" cy="437" r="16" fill="none" stroke="#16a34a" stroke-width="2.5"/><path d="M 563.0 438 L 568.0 444 L 579.0 431" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="590.0" y="442" font-size="16" font-weight="700" fill="#0f172a">Verify · Preset-Aware Quality Bar</text>
  <text x="700.0" y="463" text-anchor="middle" font-size="12" fill="#64748b">7 checks: 3 hygiene (always required) + 4 design adherence (relative to chosen preset)</text>
  <rect x="80.0" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="163.57142857142856" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">duration = 30.000s</text>
  <rect x="257.1428571428571" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="340.71428571428567" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">true peak ≤ +1 dBFS</text>
  <rect x="434.2857142857143" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="517.8571428571429" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">RMS@29.7s &lt; −40 dB</text>
  <rect x="611.4285714285714" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="695.0" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">start ≈ start_amp dB below climax</text>
  <rect x="788.5714285714286" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="872.1428571428571" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">RMS@15s near climax</text>
  <rect x="965.7142857142857" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="1049.2857142857142" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">sustain anchor &gt; start</text>
  <rect x="1142.857142857143" y="490" width="167.14285714285714" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="1226.4285714285716" y="512.0" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">output LUFS within 4dB of source</text>
  <text x="700.0" y="560" text-anchor="middle" font-size="13" fill="#059669" font-weight="600">→ exit code = number of failures (0 = ship it)</text>
