<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="#ffffff"/>
  <text x="700.0" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">End-to-End Forge Pipeline (v2)</text>
  <text x="700.0" y="68" text-anchor="middle" font-size="14" fill="#64748b">From any audio source to a verified 30-second ringtone — fully agentic.</text>
  <rect x="40.0" y="110" width="170" height="230" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="40.0" y="110" width="170" height="6" rx="14" fill="#6366f1"/>
  <g><rect x="103.0" y="158" width="44" height="28" rx="3" fill="none" stroke="#6366f1" stroke-width="2.5"/><path d="M 103.0 158 L 103.0 152 L 119.0 152 L 123.0 158 Z" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round"/><path d="M 111.0 175 L 115.0 168 L 119.0 178 L 123.0 166 L 127.0 176 L 131.0 169 L 135.0 174 L 139.0 172" fill="none" stroke="#6366f1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="125.0" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">1. Source</text>
  <text x="125.0" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">raw audio in</text>
  <text x="125.0" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">mp3 / m4a / wav</text>
  <text x="125.0" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">any duration ≥ 30s</text>
  <rect x="231.66666666666666" y="110" width="170" height="230" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="231.66666666666666" y="110" width="170" height="6" rx="14" fill="#7c3aed"/>
  <g><circle cx="300.66666666666663" cy="170" r="5" fill="#7c3aed"/><line x1="304.66666666666663" y1="170" x2="324.66666666666663" y2="156" stroke="#7c3aed" stroke-width="2"/><line x1="304.66666666666663" y1="170" x2="324.66666666666663" y2="170" stroke="#7c3aed" stroke-width="2"/><line x1="304.66666666666663" y1="170" x2="324.66666666666663" y2="184" stroke="#7c3aed" stroke-width="2"/><circle cx="328.66666666666663" cy="156" r="4" fill="#7c3aed"/><circle cx="328.66666666666663" cy="170"   r="4" fill="#7c3aed"/><circle cx="328.66666666666663" cy="184" r="4" fill="#7c3aed"/></g>
  <text x="316.66666666666663" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">2. Classify</text>
  <text x="316.66666666666663" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">detect audio type</text>
  <text x="316.66666666666663" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">MFCC + chroma</text>
  <text x="316.66666666666663" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">+ onset + ZCR</text>
  <text x="316.66666666666663" y="304" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">→ vocal/melodic/perc</text>
  <rect x="423.3333333333333" y="110" width="170" height="230" rx="14" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="423.3333333333333" y="110" width="170" height="6" rx="14" fill="#0ea5e9"/>
  <g><rect x="490.3333333333333" y="182" width="4" height="8" rx="1" fill="#0ea5e9" opacity="0.85"/><rect x="496.3333333333333" y="175" width="4" height="15" rx="1" fill="#0ea5e9" opacity="0.85"/><rect x="502.3333333333333" y="162" width="4" height="28" rx="1" fill="#0ea5e9" opacity="0.85"/><rect x="508.3333333333333" y="170" width="4" height="20" rx="1" fill="#0ea5e9" opacity="0.85"/><rect x="514.3333333333333" y="178" width="4" height="12" rx="1" fill="#0ea5e9" opacity="0.85"/><rect x="520.3333333333333" y="167" width="4" height="23" rx="1" fill="#0ea5e9" opacity="0.85"/><circle cx="526.3333333333333" cy="156" r="6" fill="none" stroke="#0ea5e9" stroke-width="2"/><line x1="530.3333333333333" y1="160" x2="535.3333333333333" y2="165" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/></g>
  <text x="508.3333333333333" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0ea5e9">3. Analyze</text>
  <text x="508.3333333333333" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">find best 30s</text>
  <text x="508.3333333333333" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">T1 loudness</text>
  <text x="508.3333333333333" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">T2 features (default)</text>
  <text x="508.3333333333333" y="304" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">T3 structural</text>
  <rect x="615.0" y="110" width="170" height="230" rx="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="615.0" y="110" width="170" height="6" rx="14" fill="#0d9488"/>
  <g><circle cx="690.0" cy="180" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/><circle cx="710.0" cy="180" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/><line x1="693.0" y1="177" x2="712.0" y2="155" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/><line x1="707.0" y1="177" x2="688.0" y2="155" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/><circle cx="700.0" cy="169" r="2" fill="#0d9488"/></g>
  <text x="700.0" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488">4. Trim</text>
  <text x="700.0" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">beat-aligned cut</text>
  <text x="700.0" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">snap to beat</text>
  <text x="700.0" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">ffmpeg -ss -t 30</text>
  <text x="700.0" y="304" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">lossless</text>
  <rect x="806.6666666666666" y="110" width="170" height="230" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="806.6666666666666" y="110" width="170" height="6" rx="14" fill="#2563eb"/>
  <g><path d="M 869.6666666666666 184 Q 881.6666666666666 182 887.6666666666666 156" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 887.6666666666666 156 L 901.6666666666666 156" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M 901.6666666666666 156 L 909.6666666666666 184" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/><line x1="867.6666666666666" y1="186" x2="915.6666666666666" y2="186" stroke="#2563eb" stroke-width="1.2" opacity="0.4"/></g>
  <text x="891.6666666666666" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">5. Envelope</text>
  <text x="891.6666666666666" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">shape + limit</text>
  <text x="891.6666666666666" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">preset by type</text>
  <text x="891.6666666666666" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">alimiter limit=0.78</text>
  <text x="891.6666666666666" y="304" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">anti-clipping</text>
  <rect x="998.3333333333333" y="110" width="170" height="230" rx="14" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="998.3333333333333" y="110" width="170" height="6" rx="14" fill="#059669"/>
  <g><circle cx="1083.3333333333333" cy="170" r="14" fill="none" stroke="#059669" stroke-width="2.5"/><circle cx="1083.3333333333333" cy="170" r="5" fill="#059669"/><line x1="1099.3" y1="170.0" x2="1105.3" y2="170.0" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1094.6" y1="181.3" x2="1098.9" y2="185.6" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1083.3" y1="186.0" x2="1083.3" y2="192.0" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1072.0" y1="181.3" x2="1067.8" y2="185.6" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1067.3" y1="170.0" x2="1061.3" y2="170.0" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1072.0" y1="158.7" x2="1067.8" y2="154.4" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1083.3" y1="154.0" x2="1083.3" y2="148.0" stroke="#059669" stroke-width="3" stroke-linecap="round"/><line x1="1094.6" y1="158.7" x2="1098.9" y2="154.4" stroke="#059669" stroke-width="3" stroke-linecap="round"/></g>
  <text x="1083.3333333333333" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">6. Encode</text>
  <text x="1083.3333333333333" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">AAC 128 kbps</text>
  <text x="1083.3333333333333" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">-c:a aac</text>
  <text x="1083.3333333333333" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">-b:a 128k</text>
  <rect x="1190.0" y="110" width="170" height="230" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2" filter="url(#card-shadow)"/>
  <rect x="1190.0" y="110" width="170" height="6" rx="14" fill="#ea580c"/>
  <g><path d="M 1259.0 178 Q 1259.0 156 1275.0 156 Q 1291.0 156 1291.0 178 L 1293.0 180 L 1257.0 180 Z" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linejoin="round"/><circle cx="1275.0" cy="154" r="2.5" fill="#ea580c"/><circle cx="1275.0" cy="184" r="3.5" fill="#ea580c"/><path d="M 1253.0 166 Q 1249.0 168 1249.0 174" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/><path d="M 1297.0 166 Q 1301.0 168 1301.0 174" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.6"/></g>
  <text x="1275.0" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#ea580c">7. Final</text>
  <text x="1275.0" y="238" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">shipped ringtone</text>
  <text x="1275.0" y="268" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">30.000s · ~480 KB</text>
  <text x="1275.0" y="286" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#334155">true peak ≤ +1 dBFS</text>
