  <text x="1355.0" y="282" text-anchor="middle" font-size="10" fill="#64748b">all green ✓</text>
  <rect x="1284" y="308" width="142" height="50" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1355.0" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">10 regression</text>
  <text x="1355.0" y="346" text-anchor="middle" font-size="10" fill="#64748b">all green ✓</text>
  <rect x="1284" y="372" width="142" height="50" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1355.0" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">2 e2e</text>
  <text x="1355.0" y="410" text-anchor="middle" font-size="10" fill="#64748b">all green ✓</text>
  <text x="1355.0" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">3 environments</text>
  <text x="1355.0" y="480" text-anchor="middle" font-size="10" fill="#64748b">MPS · CUDA · CPU</text>
  <text x="1355.0" y="500" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">10/10 regression</text>
  <text x="1355.0" y="520" text-anchor="middle" font-size="10" fill="#64748b">picks identical</text>
  <rect x="1284" y="550" width="142" height="50" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="1355.0" y="572" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">--doctor</text>
  <text x="1355.0" y="588" text-anchor="middle" font-size="10" fill="#92400e">env self-check</text>
  <text x="750.0" y="730" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">All deps managed by uv · MIT licensed · github.com/neosun100/ringtone-forge</text>
